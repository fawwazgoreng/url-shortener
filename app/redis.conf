port 6379
bind 127.0.0.1        

databases 16             

maxmemory 256mb         
maxmemory-policy allkeys-lru  

save 900 1               
save 300 10              
save 60 10000            
dbfilename dump.rdb      
dir ./                   

appendonly no           
appendfilename "appendonly.aof"
appendfsync everysec     

maxclients 1000           
timeout 300              
tcp-keepalive 60         

loglevel notice         
logfile "./logs/redis/redis.log"          

slowlog-log-slower-than 10000   
slowlog-max-len 128